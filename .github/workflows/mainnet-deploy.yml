# Mycelium Protocol - Mainnet Deployment
#
# Manual dispatch workflow for deploying individual programs to mainnet or devnet.
# Uses solana-developers/github-workflows for Docker-based deterministic builds,
# deployment, IDL upload, bytecode verification, and Squads multisig proposal creation.
#
# After CI creates the Squads proposal, 2-of-3 multisig members must approve
# via app.squads.so before the program upgrade executes on-chain.
#
# ============================================================================
# REQUIRED GITHUB SECRETS
# ============================================================================
#
# MAINNET_SOLANA_DEPLOY_URL
#   Paid mainnet RPC URL (Helius or QuickNode recommended).
#   Public mainnet RPC has aggressive rate limits -- not suitable for deployment.
#   Example: https://mainnet.helius-rpc.com/?api-key=YOUR_KEY
#
# MAINNET_DEPLOYER_KEYPAIR
#   Base58-encoded deployer private key.
#   Deployer address: F98xBPaujC3CXiKWRqudUYksw3vKoGhMAohmDoHdU9ye
#   This wallet must hold >= 15 SOL for multi-program deployment.
#
# PROGRAM_ADDRESS_KEYPAIR_SPORE
# PROGRAM_ADDRESS_KEYPAIR_HYPHA
# PROGRAM_ADDRESS_KEYPAIR_RHIZOME
# PROGRAM_ADDRESS_KEYPAIR_MERIDIAN
# PROGRAM_ADDRESS_KEYPAIR_DRP
#   Base58-encoded program keypairs (one per program).
#   These are the keypairs generated by solana-keygen whose public key matches
#   the program ID in Anchor.toml [programs.mainnet-beta].
#
# MAINNET_MULTISIG
#   Squads v4 multisig account address (created via app.squads.so).
#
# MAINNET_MULTISIG_VAULT
#   Squads vault PDA address (Vault 0 by default).
#   This becomes the upgrade authority for all programs after initial deployment.
#
# DEVNET_SOLANA_DEPLOY_URL
#   Devnet RPC URL (can use public: https://api.devnet.solana.com).
#
# DEVNET_DEPLOYER_KEYPAIR
#   Base58-encoded deployer private key for devnet.
#
# ============================================================================

name: Mainnet Deploy

on:
  workflow_dispatch:
    inputs:
      program:
        description: "Program to deploy"
        required: true
        type: choice
        options:
          - mycelium_spore
          - mycelium_hypha
          - mycelium_rhizome
          - mycelium_meridian
          - mycelium_drp
      network:
        description: "Target network"
        required: true
        type: choice
        default: "mainnet"
        options:
          - mainnet
          - devnet
      priority_fee:
        description: "Priority fee in microlamports"
        required: true
        default: "300000"

jobs:
  # -----------------------------------------------------------------------
  # Setup: resolve program name -> program ID and select the correct keypair
  # -----------------------------------------------------------------------
  setup:
    name: Resolve Program Config
    runs-on: ubuntu-latest
    outputs:
      program-id: ${{ steps.resolve.outputs.program-id }}
      keypair-secret-name: ${{ steps.resolve.outputs.keypair-secret-name }}
    steps:
      - name: Resolve program ID and keypair secret
        id: resolve
        run: |
          case "${{ github.event.inputs.program }}" in
            mycelium_spore)
              echo "program-id=GQKhpugP3tECnV64WVQoBRQembMcaW35CDPpLzGTprrR" >> "$GITHUB_OUTPUT"
              echo "keypair-secret-name=PROGRAM_ADDRESS_KEYPAIR_SPORE" >> "$GITHUB_OUTPUT"
              ;;
            mycelium_hypha)
              echo "program-id=BWaYdvceTLCR4T2E67C4uNrxxDQH5fDMDtL4kqdMPjuV" >> "$GITHUB_OUTPUT"
              echo "keypair-secret-name=PROGRAM_ADDRESS_KEYPAIR_HYPHA" >> "$GITHUB_OUTPUT"
              ;;
            mycelium_rhizome)
              echo "program-id=7nKmtUgSaZTgF5fMcjQw1LR8nfKG8kgLauqAmtC3qJWW" >> "$GITHUB_OUTPUT"
              echo "keypair-secret-name=PROGRAM_ADDRESS_KEYPAIR_RHIZOME" >> "$GITHUB_OUTPUT"
              ;;
            mycelium_meridian)
              echo "program-id=2PBZSAN2LSoGHWsWmr6kFBtrVHicTvTHiZBF8Y4B54Le" >> "$GITHUB_OUTPUT"
              echo "keypair-secret-name=PROGRAM_ADDRESS_KEYPAIR_MERIDIAN" >> "$GITHUB_OUTPUT"
              ;;
            mycelium_drp)
              echo "program-id=BKrUCdqyVLywaT3WhLcKkLZ4nEib3K9ZXA4bVd7xbifU" >> "$GITHUB_OUTPUT"
              echo "keypair-secret-name=PROGRAM_ADDRESS_KEYPAIR_DRP" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # -----------------------------------------------------------------------
  # Mainnet: build, deploy, upload IDL, verify, create Squads proposal
  # -----------------------------------------------------------------------
  deploy-mainnet:
    name: Deploy to Mainnet
    needs: setup
    if: ${{ github.event.inputs.network == 'mainnet' }}
    uses: solana-developers/github-workflows/.github/workflows/reusable-build.yaml@v0.2.9
    with:
      program: ${{ github.event.inputs.program }}
      program-id: ${{ needs.setup.outputs.program-id }}
      network: "mainnet"
      deploy: true
      upload_idl: true
      verify: true
      use-squads: true
      priority-fee: ${{ github.event.inputs.priority_fee }}
    secrets:
      MAINNET_SOLANA_DEPLOY_URL: ${{ secrets.MAINNET_SOLANA_DEPLOY_URL }}
      MAINNET_DEPLOYER_KEYPAIR: ${{ secrets.MAINNET_DEPLOYER_KEYPAIR }}
      PROGRAM_ADDRESS_KEYPAIR: ${{ secrets[needs.setup.outputs.keypair-secret-name] }}
      MAINNET_MULTISIG: ${{ secrets.MAINNET_MULTISIG }}
      MAINNET_MULTISIG_VAULT: ${{ secrets.MAINNET_MULTISIG_VAULT }}

  # -----------------------------------------------------------------------
  # Devnet: build and deploy (no Squads, no IDL upload)
  # -----------------------------------------------------------------------
  deploy-devnet:
    name: Deploy to Devnet
    needs: setup
    if: ${{ github.event.inputs.network == 'devnet' }}
    uses: solana-developers/github-workflows/.github/workflows/reusable-build.yaml@v0.2.9
    with:
      program: ${{ github.event.inputs.program }}
      program-id: ${{ needs.setup.outputs.program-id }}
      network: "devnet"
      deploy: true
      verify: true
    secrets:
      DEVNET_SOLANA_DEPLOY_URL: ${{ secrets.DEVNET_SOLANA_DEPLOY_URL }}
      DEVNET_DEPLOYER_KEYPAIR: ${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}
      PROGRAM_ADDRESS_KEYPAIR: ${{ secrets[needs.setup.outputs.keypair-secret-name] }}
